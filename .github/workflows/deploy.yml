name: Deploy Azure Databricks Pipeline

# =============================================================================
# SINGLE-CLICK DEPLOYMENT WORKFLOW
# Options: Deploy, Destroy, Run Pipeline, Full Cycle
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Select Action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
          - run-pipeline
          - full-cycle
      databricks_sku:
        description: 'Databricks SKU (trial=14 days free)'
        required: true
        default: 'trial'
        type: choice
        options:
          - trial
          - standard
          - premium

# =============================================================================
# SECRETS TO CONFIGURE IN GITHUB (Settings > Secrets > Actions):
# =============================================================================
# ARM_SUBSCRIPTION_ID   - Your Azure Subscription ID
# ARM_TENANT_ID         - Azure AD Tenant ID  
# ARM_CLIENT_ID         - Service Principal App ID
# ARM_CLIENT_SECRET     - Service Principal Secret
# SQL_ADMIN_PASSWORD    - SQL Server admin password
# =============================================================================

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  TF_VERSION: "1.6.0"
  PREFIX: "rtsa"
  LOCATION: "eastus"

jobs:
  # ==========================================================================
  # PLAN - Show what will be created/modified
  # ==========================================================================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    outputs:
      plan_exit_code: ${{ steps.plan.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Terraform Plan
        id: plan
        run: cd terraform && terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Save Plan Output
        if: always()
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          if [ -f plan_output.txt ]; then
            cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Plan Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-output
          path: plan_output.txt
          retention-days: 7

      - name: Post Plan Summary
        if: steps.plan.outcome == 'success'
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Plan created successfully" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # DEPLOY - Apply the Terraform changes
  # ==========================================================================
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: (github.event.inputs.action == 'deploy' || github.event.inputs.action == 'full-cycle') && needs.plan.outputs.plan_exit_code == 'success'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade

      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve -no-color 2>&1 | tee apply_output.txt
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Save Apply Output
        if: always()
        run: |
          echo "## Terraform Apply Output" >> $GITHUB_STEP_SUMMARY
          if [ -f apply_output.txt ]; then
            cat apply_output.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Apply Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-output
          path: apply_output.txt
          retention-days: 7

      - name: Post Apply Summary
        run: |
          echo "## Deployment Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Created:" >> $GITHUB_STEP_SUMMARY
          echo "- Azure Resource Group" >> $GITHUB_STEP_SUMMARY
          echo "- ADLS Gen2 Storage Account" >> $GITHUB_STEP_SUMMARY
          echo "- Azure Key Vault" >> $GITHUB_STEP_SUMMARY
          echo "- Event Hubs Namespace" >> $GITHUB_STEP_SUMMARY
          echo "- Azure SQL Database" >> $GITHUB_STEP_SUMMARY
          echo "- Databricks Workspace" >> $GITHUB_STEP_SUMMARY
          echo "- Log Analytics Workspace" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Databricks PAT Token:" >> $GITHUB_STEP_SUMMARY
          echo "Run this command to get the token:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'cd terraform && terraform output -raw databricks_pat_token' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Important**: Add this token to GitHub Secrets as DATABRICKS_TOKEN to enable automatic pipeline triggers." >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # CLEANUP - Run on failure to destroy resources
  # ==========================================================================
  cleanup:
    name: Cleanup on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && (github.event.inputs.action == 'deploy' || github.event.inputs.action == 'full-cycle')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade 2>&1 || true

      - name: Terraform Destroy
        run: |
          echo "## ⚠️ Deployment Failed - Cleaning Up Resources" >> $GITHUB_STEP_SUMMARY
          cd terraform && terraform destroy -auto-approve -no-color 2>&1 | tee destroy_output.txt
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Upload Destroy Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: destroy-output
          path: destroy_output.txt
          retention-days: 7

      - name: Post Cleanup Summary
        run: |
          echo "## Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "All resources created during failed deployment have been destroyed." >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # RUN PIPELINE - Trigger Databricks Job
  # ==========================================================================
  # Note: To trigger Databricks jobs from GitHub Actions, you need to:
  # 1. Create a Databricks PAT token in Databricks UI
  # 2. Store it in GitHub Secrets as DATABRICKS_TOKEN
  # 3. Use the databricks_token in the steps below
  # For now, this job provides workspace info - run the job manually from Databricks UI
  run-pipeline:
    name: Run Databricks Pipeline
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'run-pipeline' || github.event.inputs.action == 'full-cycle'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId": "${{ secrets.ARM_CLIENT_ID }}", "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}", "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}", "tenantId": "${{ secrets.ARM_TENANT_ID }}"}'

      - name: Get Databricks Workspace Details
        id: workspace
        run: |
          # Use Azure CLI v0.11+ compatible commands (works with latest CLI)
          RESOURCE_GROUP=$(az group list --query "[?contains(name, 'rg-rtsa') && contains(name, '-dev')].name | [0]" -o tsv)
          echo "resource_group=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          
          # Get workspace using resource provider API (more reliable than databricks extension)
          WORKSPACE=$(az resource list --resource-group "$RESOURCE_GROUP" --resource-type Microsoft.Databricks/workspaces --query "[0].name" -o tsv)
          echo "workspace_name=$WORKSPACE" >> $GITHUB_OUTPUT
          
          # Get workspace URL using resource properties (works with all CLI versions)
          WORKSPACE_URL=$(az resource show --resource-group "$RESOURCE_GROUP" --name "$WORKSPACE" --resource-type Microsoft.Databricks/workspaces --query "properties.workspaceUrl" -o tsv)
          echo "workspace_url=https://$WORKSPACE_URL" >> $GITHUB_OUTPUT
          
          # Get workspace resource ID
          WORKSPACE_RESOURCE_ID=$(az resource show --resource-group "$RESOURCE_GROUP" --name "$WORKSPACE" --resource-type Microsoft.Databricks/workspaces --query "id" -o tsv)
          echo "workspace_resource_id=$WORKSPACE_RESOURCE_ID" >> $GITHUB_OUTPUT

      - name: Get Databricks Job ID
        id: job
        run: |
          WORKSPACE_URL=${{ steps.workspace.outputs.workspace_url }}
          WORKSPACE_NAME=${{ steps.workspace.outputs.workspace_name }}
          
          if [ -n "${{ secrets.DATABRICKS_TOKEN }}" ]; then
            # Try to get job list using the new API endpoint (more reliable)
            JOBS_JSON=$(curl -s -X GET "${WORKSPACE_URL}/api/2.1/jobs/list" \
              -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
              -H "Content-Type: application/json")
            
            # Parse job ID from the response
            JOB_ID=$(echo $JOBS_JSON | grep -o '"job_id":[0-9]*' | head -1 | grep -o '[0-9]*')
            
            # If no job found, check if job exists by name
            if [ -z "$JOB_ID" ]; then
              # Get job details by name
              JOB_DETAILS=$(curl -s -X GET "${WORKSPACE_URL}/api/2.1/jobs/get?job_id=0" \
                -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
                -H "Content-Type: application/json" 2>/dev/null)
              
              # Try to find the pipeline job by name
              JOB_ID=$(echo "$JOB_DETAILS" | grep -o '"job_id":[0-9]*' | head -1 | grep -o '[0-9]*')
            fi
            
            if [ -n "$JOB_ID" ]; then
              echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
              echo "has_token=true" >> $GITHUB_OUTPUT
            else
              echo "job_id=" >> $GITHUB_OUTPUT
              echo "has_token=true" >> $GITHUB_OUTPUT
              echo "## ⚠️ Job not found in workspace. Please run the pipeline manually from Databricks UI." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "job_id=" >> $GITHUB_OUTPUT
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Databricks Job (Automatic)
        if: steps.job.outputs.has_token == 'true' && steps.job.outputs.job_id != ''
        run: |
          WORKSPACE_URL=${{ steps.workspace.outputs.workspace_url }}
          JOB_ID=${{ steps.job.outputs.job_id }}
          TOKEN=${{ secrets.DATABRICKS_TOKEN }}
          
          echo "Starting Databricks Job: $JOB_ID"
          curl -s -X POST "${WORKSPACE_URL}/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $JOB_ID}"
          
          echo "## Pipeline Started! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Job ID $JOB_ID triggered successfully." >> $GITHUB_STEP_SUMMARY

      - name: Get Databricks Job Info (Manual)
        if: steps.job.outputs.has_token != 'true' || steps.job.outputs.job_id == ''
        run: |
          WORKSPACE_URL=${{ steps.workspace.outputs.workspace_url }}
          WORKSPACE_NAME=${{ steps.workspace.outputs.workspace_name }}
          
          echo "## Databricks Pipeline Info 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workspace URL**: $WORKSPACE_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Workspace Name**: $WORKSPACE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To run the pipeline:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to: $WORKSPACE_URL" >> $GITHUB_STEP_SUMMARY
          echo "2. Navigate to Jobs > Real-Time-Sales-Analytics-Full-Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "3. Click Run Now" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Add DATABRICKS_TOKEN to GitHub secrets to automate this step." >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # DESTROY - Clean up all resources (use with caution!)
  # ==========================================================================
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade

      - name: Terraform Destroy
        run: cd terraform && terraform destroy -auto-approve -no-color
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Post Destroy Summary
        run: |
          echo "## Resources Destroyed 🗑️" >> $GITHUB_STEP_SUMMARY
          echo "All Azure resources have been removed." >> $GITHUB_STEP_SUMMARY
