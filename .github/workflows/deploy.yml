name: Deploy Azure Databricks Pipeline

# =============================================================================
# SINGLE-CLICK DEPLOYMENT WORKFLOW
# Options: Deploy, Destroy, Run Pipeline, Full Cycle
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Select Action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
          - run-pipeline
          - full-cycle
      databricks_sku:
        description: 'Databricks SKU (trial=14 days free)'
        required: true
        default: 'trial'
        type: choice
        options:
          - trial
          - standard
          - premium

# =============================================================================
# SECRETS TO CONFIGURE IN GITHUB (Settings > Secrets > Actions):
# =============================================================================
# ARM_SUBSCRIPTION_ID   - Your Azure Subscription ID
# ARM_TENANT_ID         - Azure AD Tenant ID  
# ARM_CLIENT_ID         - Service Principal App ID
# ARM_CLIENT_SECRET     - Service Principal Secret
# SQL_ADMIN_PASSWORD    - SQL Server admin password
# =============================================================================

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  TF_VERSION: "1.6.0"
  PREFIX: "rtsa"
  LOCATION: "eastus"

jobs:
  # ==========================================================================
  # PLAN - Show what will be created/modified
  # ==========================================================================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    outputs:
      plan_exit_code: ${{ steps.plan.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Terraform Plan
        id: plan
        run: cd terraform && terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Save Plan Output
        if: always()
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          if [ -f plan_output.txt ]; then
            cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Plan Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-output
          path: plan_output.txt
          retention-days: 7

      - name: Post Plan Summary
        if: steps.plan.outcome == 'success'
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Plan created successfully" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # DEPLOY - Apply the Terraform changes
  # ==========================================================================
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: (github.event.inputs.action == 'deploy' || github.event.inputs.action == 'full-cycle') && needs.plan.outputs.plan_exit_code == 'success'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade

      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve -no-color 2>&1 | tee apply_output.txt
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Save Apply Output
        if: always()
        run: |
          echo "## Terraform Apply Output" >> $GITHUB_STEP_SUMMARY
          if [ -f apply_output.txt ]; then
            cat apply_output.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Apply Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-output
          path: apply_output.txt
          retention-days: 7

      - name: Post Apply Summary
        run: |
          echo "## Deployment Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Created:" >> $GITHUB_STEP_SUMMARY
          echo "- Azure Resource Group" >> $GITHUB_STEP_SUMMARY
          echo "- ADLS Gen2 Storage Account" >> $GITHUB_STEP_SUMMARY
          echo "- Azure Key Vault" >> $GITHUB_STEP_SUMMARY
          echo "- Event Hubs Namespace" >> $GITHUB_STEP_SUMMARY
          echo "- Azure SQL Database" >> $GITHUB_STEP_SUMMARY
          echo "- Databricks Workspace" >> $GITHUB_STEP_SUMMARY
          echo "- Log Analytics Workspace" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # CLEANUP - Run on failure to destroy resources
  # ==========================================================================
  cleanup:
    name: Cleanup on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && (github.event.inputs.action == 'deploy' || github.event.inputs.action == 'full-cycle')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade 2>&1 || true

      - name: Terraform Destroy
        run: |
          echo "## ⚠️ Deployment Failed - Cleaning Up Resources" >> $GITHUB_STEP_SUMMARY
          cd terraform && terraform destroy -auto-approve -no-color 2>&1 | tee destroy_output.txt
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Upload Destroy Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: destroy-output
          path: destroy_output.txt
          retention-days: 7

      - name: Post Cleanup Summary
        run: |
          echo "## Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "All resources created during failed deployment have been destroyed." >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # DESTROY - Clean up all resources (use with caution!)
  # ==========================================================================
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars << 'EOF'
          subscription_id = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          tenant_id       = "${{ secrets.ARM_TENANT_ID }}"
          client_id       = "${{ secrets.ARM_CLIENT_ID }}"
          client_secret   = "${{ secrets.ARM_CLIENT_SECRET }}"
          prefix          = "${{ env.PREFIX }}"
          location        = "${{ env.LOCATION }}"
          environment     = "${{ github.event.inputs.environment }}"
          databricks_sku  = "${{ github.event.inputs.databricks_sku }}"
          sql_admin_password = "${{ secrets.SQL_ADMIN_PASSWORD }}"
          eventhub_sku           = "Standard"
          cluster_max_workers    = 1
          cluster_autotermination_minutes = 10
          spark_version          = "14.3.x-scala2.12"
          sql_database_sku       = "Free"
          github_pat            = ""
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade

      - name: Terraform Destroy
        run: cd terraform && terraform destroy -auto-approve -no-color
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: Post Destroy Summary
        run: |
          echo "## Resources Destroyed 🗑️" >> $GITHUB_STEP_SUMMARY
          echo "All Azure resources have been removed." >> $GITHUB_STEP_SUMMARY
