name: Auto Upload PAT Token

on:
  workflow_run:
    workflows: ["Deploy Azure Databricks Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  upload-token:
    name: Auto Upload DATABRICKS_TOKEN
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terraform Backend
        run: |
          chmod +x scripts/setup_backend.sh
          ./scripts/setup_backend.sh
        env:
          ENVIRONMENT: dev

      - name: Terraform Init
        run: cd terraform && terraform init -upgrade -backend-config=../backend_config/backend.hcl

      - name: Get PAT Token from Terraform
        run: |
          cd terraform
          PAT_TOKEN=$(terraform output -raw databricks_pat_token)
          cd ..
          echo "$PAT_TOKEN" > pat_token.txt

      - name: Upload to GitHub Secrets
        run: |
          TOKEN=$(cat pat_token.txt)
          echo "$TOKEN" | gh secret set DATABRICKS_TOKEN --repo ${{ github.repository }}
          echo "✅ DATABRICKS_TOKEN uploaded automatically!"
